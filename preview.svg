  <path d="M600 135 C590 120 580 100 600 85 C620 100 610 120 600 135Z" fill="#ffd700" opacity="0.9"/>
  <path d="M600 135 C594 122 588 108 600 96 C612 108 606 122 600 135Z" fill="#fff" opacity="0.6"/>
  <!-- Diya body -->
  <ellipse cx="600" cy="145" rx="22" ry="8" fill="#c8780a"/>
  <path d="M578 145 Q600 158 622 145" stroke="#ffd700" stroke-width="1" fill="none"/>
  <!-- Lotus left -->
  <g transform="translate(200,315)">
    <path d="M0 0 C-10-15-20-25-15-35 C-8-25 0-15 0 0Z" fill="#e8678a" opacity="0.6"/>
    <path d="M0 0 C10-15 20-25 15-35 C8-25 0-15 0 0Z" fill="#e8678a" opacity="0.6"/>
    <path d="M0 0 C-15-10-28-15-30-25 C-18-18-8-10 0 0Z" fill="#ffb3c6" opacity="0.5"/>
