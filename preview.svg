  <rect x="30" y="30" width="1140" height="570" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.3"/>
  <!-- Corner ornaments -->
  <text x="35" y="65" font-size="32" fill="#ffd700" opacity="0.6" font-family="serif">✦</text>
  <text x="1135" y="65" font-size="32" fill="#ffd700" opacity="0.6" font-family="serif">✦</text>
  <text x="35" y="610" font-size="32" fill="#ffd700" opacity="0.6" font-family="serif">✦</text>
  <text x="1135" y="610" font-size="32" fill="#ffd700" opacity="0.6" font-family="serif">✦</text>
