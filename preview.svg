  </g>
  <!-- Names -->
  <text x="600" y="225" text-anchor="middle" font-family="Georgia,serif" font-size="52" font-weight="bold" fill="url(#gold)" letter-spacing="3">Muthu Narendran</text>
  <text x="600" y="275" text-anchor="middle" font-family="Georgia,serif" font-size="32" fill="#e8678a" letter-spacing="8">❦  weds  ❦</text>
  <text x="600" y="335" text-anchor="middle" font-family="Georgia,serif" font-size="52" font-weight="bold" fill="url(#gold)" letter-spacing="3">Sumathi</text>
