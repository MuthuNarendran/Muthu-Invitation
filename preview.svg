  <circle cx="680" cy="555" r="2.5" fill="#ffd700" opacity="0.5"/>
  <circle cx="710" cy="555" r="2.5" fill="#ffd700" opacity="0.5"/>
  <circle cx="740" cy="555" r="2.5" fill="#ffd700" opacity="0.5"/>
