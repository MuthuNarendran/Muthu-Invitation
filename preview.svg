  <circle cx="600" cy="360" r="4" fill="#ffd700" opacity="0.8"/>
  <line x1="650" y1="360" x2="850" y2="360" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <!-- Date & venue -->
  <text x="600" y="405" text-anchor="middle" font-family="Georgia,serif" font-size="24" fill="#fffbf0" letter-spacing="2">Wednesday, 17 June 2026  ·  9:30 AM</text>
  <text x="600" y="445" text-anchor="middle" font-family="Georgia,serif" font-size="18" fill="#ffb347" letter-spacing="1" opacity="0.85">Illathu Pillamar Sanga Kalyana Mandapam, Srivilliputhur</text>
  <!-- Blessing -->
  <text x="600" y="510" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#ffd700" opacity="0.7" font-style="italic">Your presence is our greatest blessing</text>
