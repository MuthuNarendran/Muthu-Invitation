<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07081c"/>
      <stop offset="50%" stop-color="#0d0f30"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8780a"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#c8780a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Stars -->
  <circle cx="100" cy="80" r="1.5" fill="#ffd700" opacity="0.7"/>
  <circle cx="250" cy="40" r="1" fill="#ffd700" opacity="0.5"/>
  <circle cx="400" cy="100" r="2" fill="#ffd700" opacity="0.6"/>
  <circle cx="550" cy="30" r="1.5" fill="#ffd700" opacity="0.4"/>
  <circle cx="700" cy="70" r="1" fill="#ffd700" opacity="0.7"/>
  <circle cx="850" cy="45" r="2" fill="#ffd700" opacity="0.5"/>
  <circle cx="1000" cy="90" r="1.5" fill="#ffd700" opacity="0.6"/>
  <circle cx="1150" cy="55" r="1" fill="#ffd700" opacity="0.4"/>
  <circle cx="180" cy="560" r="1.5" fill="#ffd700" opacity="0.4"/>
  <circle cx="320" cy="590" r="1" fill="#ffd700" opacity="0.6"/>
  <circle cx="900" cy="580" r="2" fill="#ffd700" opacity="0.5"/>
  <circle cx="1080" cy="545" r="1.5" fill="#ffd700" opacity="0.7"/>
  <!-- Border -->
